<header class="fixed top-0 z-50 w-full bg-[#001429]/80 backdrop-blur-md shadow-[0_20px_40px_rgba(0,20,41,0.4)]">
<div class="flex justify-between items-center px-6 py-4 w-full">

<div class="flex items-center gap-4">

</button>
</div>
</div>

<p class="text-on-surface-variant font-label text-sm">تجهيز بروتوكول الاتصال السري</p>
</div>

<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent opacity-50"></div>
<div class="glass-panel p-6 rounded-xl border border-outline-variant/20 shadow-xl relative z-10">

<span class="text-[10px] font-headline tracking-[0.2em] text-primary uppercase opacity-70">الرمز السري</span>
<span class="material-symbols-outlined text-primary/40" data-icon="fingerprint">fingerprint</span>
</div>
<div class="flex flex-col items-center py-4">
<span class="font-headline text-5xl font-black tracking-[0.3em] text-primary drop-shadow-[0_0_15px_rgba(255,183,122,0.3)]">X7B9K</span>

<button class="flex items-center gap-2 text-[10px] font-label font-bold text-primary-fixed-dim uppercase bg-surface-container-high px-4 py-2 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-sm" data-icon="content_copy">content_copy</span>
                            نسخ الرمز
                        </button>
</div>
</div>
</div>
</section>
<div class="grid grid-cols-2 gap-4 mb-8">

</button>
<button class="flex items-center justify-center bg-tertiary/20 rounded-xl h-12 w-full max-w-[56px] hover:bg-tertiary/30 transition-colors active:scale-95 border border-tertiary/10">

</button>
</div>
</div>

</div>

<span class="material-symbols-outlined text-xl text-secondary" style="font-variation-settings: 'wght' 700;">keyboard_arrow_up</span>
</button>

</button>
</div>
</div>
<span class="material-symbols-outlined absolute -bottom-2 -left-2 text-secondary opacity-[0.05] text-7xl select-none" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>

</div>
</label>
<label class="flex-1 cursor-pointer">
<input class="hidden peer" name="privacy" type="radio"/>
<div class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/30 bg-surface-container-low peer-checked:bg-primary/10 peer-checked:border-primary transition-all">
<span class="material-symbols-outlined mb-2 peer-checked:text-primary" data-icon="lock">lock</span>
<span class="text-xs font-bold font-label">غرفة خاصة</span>

</label>

<span class="material-symbols-outlined" data-icon="history">history</span>
