name: Flutter CI — new_screens

on:
  push:
    branches:
      - new_screens
  pull_request:
    branches:
      - new_screens

jobs:
  analyze_and_build:
    name: Analyze & Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the new_screens branch
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: new_screens

      # 2. Setup Flutter (stable channel, latest)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 3.5. Generate Data Models (Freezed/JSON)
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs


      # 4. Run static analysis (warnings treated as errors)
      - name: Analyze
        run: flutter analyze --no-fatal-infos lib

      # 5. Run tests (if any exist)
      - name: Run tests
        run: flutter test --no-pub
        continue-on-error: true   # لا يوقف البناء إذا لم توجد tests

      # 6. Build Android APK (release)
      - name: Build APK (release)
        run: flutter build apk --release --no-pub

      # 7. Upload APK as a downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codenames-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # Optional: Web build (useful for quick preview)
  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze_and_build   # ينتظر نجاح الـ APK أولاً

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: new_screens

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable web support
        run: flutter config --enable-web

      - name: Build Web
        run: flutter build web --release --no-pub

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: codenames-web-${{ github.sha }}
          path: build/web/
          retention-days: 7
